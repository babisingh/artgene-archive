/* ── PIPELINE ────────────────────────────────────────── */
function PipelineSection({ showEndpoints }) {
  const [sel, setSel] = useState(0);
  const [state, setState] = useState('idle'); // idle | running | done
  const [gates, setGates] = useState({ alpha:'pending', beta:'pending', gamma:'pending', delta:'pending' });
  const [details, setDetails] = useState({});

  const run = async () => {
    const seq = DEMO_SEQS[sel];
    setState('running');
    setGates({ alpha:'pending', beta:'pending', gamma:'pending', delta:'pending' });
    setDetails({});

    // Try real API, fall back to static
    let result = null;
    try {
      const res = await Promise.race([
        fetch(`${API}/api/proxy/analyse`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sequence: seq.dna }),
        }),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 7000)),
      ]);
      if (res.ok) result = await res.json();
    } catch (_) {}

    // Animate gates with fallback data
    const fb = seq.fb;
    const gateOrder = ['alpha', 'beta', 'gamma', 'delta'];
    for (const g of gateOrder) {
      setGates(prev => ({ ...prev, [g]: 'running' }));
      await new Promise(r => setTimeout(r, 900 + Math.random() * 600));
      const gData = result?.gates?.[g] || fb.gates[g];
      const status = gData?.s || gData?.status || 'pass';
      setGates(prev => ({ ...prev, [g]: status === 'fail' ? 'fail' : 'pass' }));
      setDetails(prev => ({ ...prev, [g]: gData }));
      if (status === 'fail') {
        // Mark remaining as pending/halted
        const rem = gateOrder.slice(gateOrder.indexOf(g) + 1);
        for (const r of rem) {
          setGates(prev => ({ ...prev, [r]: 'pending' }));
          setDetails(prev => ({ ...prev, [r]: fb.gates[r] }));
        }
        setState('done'); return;
      }
    }
    setState('done');
  };

  const reset = () => { setState('idle'); setGates({ alpha:'pending', beta:'pending', gamma:'pending', delta:'pending' }); setDetails({}); };
  const allPass = state === 'done' && Object.values(gates).every(g => g === 'pass');
  const seq = DEMO_SEQS[sel];

  return (
    <SectionShell id="pipeline" eyebrow="§ 03 — Biosafety Pipeline"
      title="Four-gate automated biosafety review."
      lede="Select a sequence from the test-vector library and run the full analysis. All four gates execute automatically. A certificate is issued only when every gate passes.">
      {showEndpoints && (
        <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-3)', background: 'var(--paper-3)', padding: '8px 14px', borderRadius: 4, marginBottom: 28, border: '1px solid var(--border)' }}>
          POST {API}/api/proxy/analyse
        </div>
      )}
      {/* Sequence selector */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10, marginBottom: 28 }}>
        {DEMO_SEQS.map((s, i) => (
          <button key={i} onClick={() => { setSel(i); reset(); }} style={{
            textAlign: 'left', padding: '12px 14px', borderRadius: 5, cursor: 'pointer',
            border: `1.5px solid ${sel === i ? 'var(--accent)' : 'var(--border)'}`,
            background: sel === i ? 'rgba(192,80,32,0.04)' : 'var(--paper)',
            transition: 'all 140ms',
          }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 9.5, color: sel === i ? 'var(--accent)' : 'var(--ink-3)', letterSpacing: '0.08em', marginBottom: 3 }}>{s.id}</div>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 12.5, fontWeight: 600, color: 'var(--ink)', marginBottom: 2 }}>{s.name}</div>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 11, color: 'var(--ink-3)' }}>{s.desc}</div>
          </button>
        ))}
      </div>

      {/* Sequence preview */}
      <div style={{ background: '#f4faf9', border: '1px solid var(--border)', borderRadius: 5, padding: '10px 14px', marginBottom: 24, fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--ink-2)', letterSpacing: '0.05em', wordBreak: 'break-all', lineHeight: 1.6 }}>
        <span style={{ color: 'var(--ink-3)', marginRight: 8 }}>5′</span>{seq.dna}<span style={{ color: 'var(--ink-3)', marginLeft: 2 }}>…3′</span>
        <span style={{ float: 'right', fontSize: 10, color: 'var(--ink-3)' }}>{seq.len} bp</span>
      </div>

      <div style={{ display: 'flex', gap: 12, marginBottom: 32 }}>
        {state === 'idle' && <button className="btn btn-accent" onClick={run}>Run analysis →</button>}
        {state === 'running' && <button className="btn btn-ghost" disabled style={{ opacity: 0.6 }}>Analysing…</button>}
        {state === 'done' && <><button className="btn btn-primary" onClick={run}>Run again</button><button className="btn btn-ghost" onClick={reset}>Reset</button></>}
      </div>

      {/* Gate tracker */}
      <div style={{ border: '1px solid var(--border)', borderRadius: 6, overflow: 'hidden' }}>
        {Object.entries(GATE_META).map(([key, meta]) => {
          const status = gates[key];
          const detail = details[key];
          return (
            <div key={key} className="gate-row" style={{ padding: '18px 22px' }}>
              <div style={{ width: 36, height: 36, borderRadius: '50%', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
                background: status === 'pass' ? 'rgba(13,145,104,0.1)' : status === 'fail' ? 'rgba(200,50,50,0.08)' : status === 'running' ? 'rgba(192,80,32,0.08)' : '#f0f5f5',
                border: `1.5px solid ${status === 'pass' ? 'rgba(13,145,104,0.3)' : status === 'fail' ? 'rgba(200,50,50,0.25)' : status === 'running' ? 'rgba(192,80,32,0.3)' : 'var(--border)'}`,
                fontSize: 14, transition: 'all 300ms',
              }}>
                {status === 'running' ? <span style={{ animation: 'spin 1s linear infinite', display: 'inline-block' }}>○</span>
                 : status === 'pass' ? '✓' : status === 'fail' ? '✕' : meta.icon}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
                  <span style={{ fontFamily: 'var(--sans)', fontSize: 13.5, fontWeight: 600, color: 'var(--ink)' }}>{meta.label}</span>
                  {status !== 'pending' && status !== 'running' && (
                    <Badge type={status} label={status.toUpperCase()} />
                  )}
                  {status === 'running' && <Badge type="pending" label="RUNNING…" />}
                </div>
                <div style={{ fontFamily: 'var(--sans)', fontSize: 12.5, color: 'var(--ink-3)' }}>
                  {detail?.detail || meta.desc}
                </div>
                {detail?.score !== undefined && status === 'pass' && (
                  <div style={{ marginTop: 8, height: 3, borderRadius: 2, background: 'var(--border)', overflow: 'hidden', maxWidth: 220 }}>
                    <div style={{ height: '100%', width: `${Math.min(detail.score, 100)}%`, background: 'var(--verify)', borderRadius: 2, transition: 'width 800ms ease' }} />
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Certificate result */}
      {allPass && (
        <div style={{ marginTop: 24, padding: '24px 28px', border: '1.5px solid rgba(13,145,104,0.3)', borderRadius: 6, background: 'rgba(13,145,104,0.04)', display: 'flex', alignItems: 'center', gap: 20 }}>
          <div style={{ fontSize: 32 }}>🔏</div>
          <div>
            <div style={{ fontFamily: 'var(--sans)', fontWeight: 600, fontSize: 15, color: 'var(--ink)', marginBottom: 4 }}>Certificate issued: {seq.fb.cert}</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: 'var(--verify)', letterSpacing: '0.08em' }}>ALL FOUR GATES PASSED · WOTS+ SIGNATURE APPLIED · IMMUTABLE LEDGER ENTRY CREATED</div>
          </div>
        </div>
      )}
      {state === 'done' && !allPass && (
        <div style={{ marginTop: 24, padding: '20px 24px', border: '1.5px solid rgba(200,50,50,0.25)', borderRadius: 6, background: 'rgba(200,50,50,0.04)' }}>
          <div style={{ fontFamily: 'var(--sans)', fontWeight: 600, fontSize: 14, color: '#b02020', marginBottom: 4 }}>Certificate not issued</div>
          <div style={{ fontFamily: 'var(--sans)', fontSize: 13, color: 'var(--ink-2)' }}>One or more biosafety gates failed. Sequence cannot be registered. Details sent to depositor for review.</div>
        </div>
      )}
      <style>{`@keyframes spin { to { transform: rotate(360deg) } }`}</style>
    </SectionShell>
  );
}

  const recipients = [
    { id:'R-001', name:'Lab A — MIT',      wmark:'Variant α-01', leaked:false },

          </div>
          <div>
            <div style={{ fontFamily:'var(--mono)', fontSize:10, color:'var(--ink-3)', letterSpacing:'0.1em', marginBottom:12, textTransform:'uppercase' }}>Certificate — AG-2026-000842</div>
            <div style={{ border:'1px solid var(--border)', borderRadius:6, padding:'22px 20px', background:'var(--paper)' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:18 }}>

                </div>

              </div>
              {[['Accession','AG-2026-000842'],['Sequence','GFP-variant-β'],['Depositor','Ginkgo Bioworks'],['Issued','2026-04-15 14:32 UTC'],['Signature','WOTS+ / SHA3-256'],['Distribution copies','0 — not yet distributed']].map(([k,v]) => (
                <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:'1px solid #eaf2f1', fontFamily:'var(--sans)', fontSize:12.5 }}>

                  <span style={{ color:'var(--ink)', fontWeight:500 }}>{v}</span>
                </div>
              ))}
              <div style={{ marginTop:12, fontFamily:'var(--mono)', fontSize:9, color:'var(--ink-3)', wordBreak:'break-all' }}>SIG: a3f7c2e1b9d4…8f2a1c0e3b7d</div>
            </div>
          </div>
        </div>
      )}

      {/* ② Distribute */}
      {step === 1 && (
        <div>

          <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:12, marginBottom:24 }}>
            {recipients.map((r,i) => (

          <div style={{ padding:'12px 16px', background:'rgba(192,80,32,0.04)', border:'1px solid rgba(192,80,32,0.15)', borderRadius:5, fontFamily:'var(--sans)', fontSize:13, color:'var(--ink-2)', lineHeight:1.6 }}>

        </div>

      {/* ③ Trace */}

        <div>

    { n:2, label:'Compliance', status:'done',   items:['DURC manifest','SCD-1.0 document','Fragment assembly screen','Provenance tracing','Pathway bundles'] },
    { n:3, label:'Scale',      status:'active', items:['Partner onboarding (12)','SecureDNA production','IBBIS v2 integration','Performance benchmarks'] },
    { n:4, label:'Crypto',     status:'next',   items:['LWE lattice commitment','ZK proof system','Full WOTS+ verification','Merkle pathway proofs'] },
    { n:5, label:'SDK',        status:'next',   items:['Python SDK','R package','Julia bindings','REST SDK v2'] },
    { n:6, label:'Production', status:'next',   items:['ESM-2 650M embeddings','Rich metadata','WebSocket live feed','Mobile-first UI'] },
  ];
  return (
    <SectionShell id="roadmap" eyebrow="§ 09 — Roadmap" title="Six phases to full production."
      lede="Phases 1 and 2 are complete. Phase 3 is active — partner onboarding and production hardening.">
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 14 }}>
        {phases.map(p => (
          <div key={p.n} className="card" style={{ borderColor: p.status === 'active' ? 'var(--accent)' : undefined }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: p.status === 'done' ? 'var(--verify)' : p.status === 'active' ? 'var(--accent)' : 'var(--ink-3)', fontWeight: 500 }}>
                PHASE {p.n}
              </span>
              <Badge type={p.status === 'done' ? 'pass' : p.status === 'active' ? 'live' : 'pipeline'}
                label={p.status === 'done' ? 'DONE' : p.status === 'active' ? 'ACTIVE' : 'PLANNED'} />
            </div>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 14, fontWeight: 600, color: 'var(--ink)', marginBottom: 12 }}>{p.label}</div>
            {p.items.map((item, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 0', fontFamily: 'var(--sans)', fontSize: 12.5, color: p.status === 'next' ? 'var(--ink-3)' : 'var(--ink-2)' }}>
                <span style={{ color: p.status === 'done' ? 'var(--verify)' : p.status === 'active' ? 'var(--accent)' : 'var(--border)', fontSize: 10 }}>
                  {p.status === 'done' ? '✓' : p.status === 'active' ? '›' : '·'}
                </span>
                {item}
              </div>
            ))}
          </div>
        ))}
      </div>
    </SectionShell>
  );
}

/* ── CTA ─────────────────────────────────────────────── */

    <section id="cta" data-screen-label="§ 09 — Get involved" style={{ padding: '96px 0', background: 'var(--ink)' }}>
      <div className="wrap" style={{ textAlign: 'center' }}>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: 'rgba(255,255,255,0.35)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 24 }}>§ 09 — Get involved</div>
        <h2 style={{ fontFamily: 'var(--sans)', fontSize: 'clamp(28px,4vw,48px)', fontWeight: 700, color: 'white', margin: '0 0 20px', letterSpacing: '-0.03em', lineHeight: 1.15 }}>
          Every AI-designed sequence<br />deserves a chain of custody.
        </h2>
        <p style={{ fontFamily: 'var(--sans)', fontSize: 15, color: 'rgba(255,255,255,0.55)', maxWidth: 520, margin: '0 auto 52px', lineHeight: 1.7 }}>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 20, maxWidth: 700, margin: '0 auto 48px' }}>

            { role:'Institutions', desc:'Join 12 partner institutions contributing to the consortium charter.', cta:'Become a partner →' },
            { role:'Developers', desc:'Build on the ArtGene API. Auth-free demo endpoints available now.', cta:'Read the API docs →' },

            <div key={c.role} style={{ padding: '24px 20px', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 6, textAlign: 'left' }}>

              <div style={{ fontFamily: 'var(--sans)', fontSize: 13.5, color: 'rgba(255,255,255,0.7)', lineHeight: 1.55, marginBottom: 16 }}>{c.desc}</div>

        </div>
        <a href="#pipeline" className="btn" style={{ background: 'var(--accent)', color: 'white', fontSize: 14, padding: '12px 28px' }}>Run the live demo ↓</a>

        {/* Open call */}
        <div style={{ marginTop: 72, borderTop: '1px solid rgba(255,255,255,0.08)', paddingTop: 52, maxWidth: 640, margin: '72px auto 0' }}>

          <p style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: 'clamp(18px,2.2vw,24px)', color: 'rgba(255,255,255,0.82)', lineHeight: 1.6, marginBottom: 28 }}>
            "The infrastructure for AI-designed biology should be built in public, by the people who understand what's at stake."

          <p style={{ fontFamily: 'var(--sans)', fontSize: 14, color: 'rgba(255,255,255,0.45)', lineHeight: 1.75, marginBottom: 32 }}>

          <div style={{ display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap' }}>

              { label: 'Join the mailing list', secondary: false },

            ].map(b => (
              <a key={b.label} href="#" className="btn" style={{
                background: b.secondary ? 'transparent' : 'rgba(255,255,255,0.08)',
                color: b.secondary ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.85)',

/* ── TWEAKS ──────────────────────────────────────────── */
function TweaksPanel({ tweaks, setTweaks, visible, setVisible }) {
  if (!visible) return null;
  return (
    <div className="tweaks-panel">
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <span style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.1em', color: 'var(--ink-3)', textTransform: 'uppercase' }}>Tweaks</span>
        <button onClick={() => { setVisible(false); window.parent.postMessage({type:'__edit_mode_dismissed'},'*'); }}
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-3)', fontSize: 16 }}>×</button>
      </div>
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontFamily: 'var(--sans)', fontSize: 11.5, fontWeight: 500, color: 'var(--ink)', marginBottom: 8 }}>Audience</div>
        {['funder', 'technical'].map(v => (
          <label key={v} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, cursor: 'pointer', fontFamily: 'var(--sans)', fontSize: 12.5, color: tweaks.audience === v ? 'var(--ink)' : 'var(--ink-3)' }}>
            <input type="radio" name="audience" checked={tweaks.audience === v} onChange={() => {
              const next = { ...tweaks, audience: v };
              setTweaks(next);
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
            }} style={{ accentColor: 'var(--accent)' }} />
            {v === 'funder' ? 'Funder / partner' : 'Technical detail'}
          </label>
        ))}
      </div>
      <div>
        <div style={{ fontFamily: 'var(--sans)', fontSize: 11.5, fontWeight: 500, color: 'var(--ink)', marginBottom: 8 }}>Accent colour</div>
        {['#c05020','#1a6fa8','#1a8c60'].map(c => (
          <label key={c} style={{ display: 'inline-flex', alignItems: 'center', gap: 5, marginRight: 10, cursor: 'pointer' }}>
            <input type="radio" name="accent" checked={tweaks.accent === c} onChange={() => {
              const next = { ...tweaks, accent: c };
              setTweaks(next);
              document.documentElement.style.setProperty('--accent', c);
              window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
            }} style={{ accentColor: c }} />
            <span style={{ width: 16, height: 16, borderRadius: '50%', background: c, display: 'inline-block', border: '1px solid rgba(0,0,0,0.1)' }} />
          </label>
        ))}
      </div>
    </div>
  );
}

/* ── APP ─────────────────────────────────────────────── */
function App() {
  const [active, setActive] = useState('hero');
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);
  const contentRef = useRef();

  // Apply initial tweaks
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accent);
  }, []);

  // Tweaks panel protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Intersection observer for sidebar
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });
    }, { threshold: 0.35 });
    SECTIONS.forEach(s => {
      const el = document.getElementById(s.id);
      if (el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);

  const tech = tweaks.audience === 'technical';

  return (
    <>
      <GovStrip />
      <SiteHeader />
      <main>
        <div className="showcase-layout">
          <aside className="showcase-sidebar">
            {SECTIONS.map(s => (
              <a key={s.id} href={`#${s.id}`} className={active === s.id ? 'active' : ''}>{s.label}</a>
            ))}
          </aside>
          <div className="showcase-content" ref={contentRef}>
            <HeroSection />
            <FeaturesSection />
            <PipelineSection showEndpoints={tech} />
            <WatermarkProvenanceSection />
            <FragmentsSection showEndpoints={tech} />
            <ComplianceSection />
            <RegistrySection showEndpoints={tech} />
            <RoadmapSection />
            <CTASection />
          </div>
        </div>
      </main>
      <SiteFooter />
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={tweaksVisible} setVisible={setTweaksVisible} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
