<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ArtGene Archive — A public registry for AI-generated biological sequences</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ArtGene Archive — design tokens */
:root {
  --paper: #fafaf6;
  --paper-2: #ffffff;
  --paper-3: #f3f1e9;
  --ink: #1c1b17;
  --ink-2: #3b3a34;
  --ink-3: #6d6b60;
  --ink-4: #9e9b8d;
  --rule: #e2ddcb;
  --rule-2: #eeeadb;
  --accent: oklch(0.48 0.13 45);
  --accent-soft: oklch(0.95 0.035 45);
  --verify: oklch(0.52 0.08 195);
  --verify-soft: oklch(0.96 0.025 195);
  --warn: oklch(0.62 0.14 70);
  --danger: oklch(0.52 0.16 25);
  --shadow-card: 0 1px 0 rgba(28,27,23,0.04), 0 0 0 0.5px rgba(28,27,23,0.08);
  --radius: 3px;
  --radius-lg: 6px;
  --serif: 'Manrope', -apple-system, system-ui, sans-serif;
  --sans: 'Manrope', -apple-system, system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14.5px;
  line-height: 1.55;
  font-feature-settings: 'ss01','cv11';
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }

/* Subtle paper texture via layered noise */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(196,69,54,0.025), transparent 50%),
    radial-gradient(ellipse at 100% 50%, rgba(122,61,31,0.02), transparent 60%);
}

.app { position: relative; z-index: 1; }

/* ============ HEADER ============ */
.site-header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklab, var(--paper) 92%, transparent);
  backdrop-filter: saturate(1.2) blur(12px);
  -webkit-backdrop-filter: saturate(1.2) blur(12px);
  border-bottom: 0.5px solid var(--rule);
}
.site-header-inner {
  max-width: 1360px;
  margin: 0 auto;
  padding: 14px 40px;
  display: flex;
  align-items: center;
  gap: 40px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--sans);
  font-size: 15.5px;
  letter-spacing: -0.01em;
  font-weight: 600;
}
.brand .glyph {
  width: 24px; height: 24px;
}
.brand em {
  font-style: normal;
  font-weight: 400;
  color: var(--ink-3);
}
.nav {
  display: flex;
  gap: 2px;
  margin-left: auto;
  align-items: center;
}
.nav a {
  padding: 7px 14px;
  font-size: 13.5px;
  color: var(--ink-2);
  border-radius: 999px;
  letter-spacing: 0.005em;
  transition: background 0.15s, color 0.15s;
}
.nav a:hover { color: var(--ink); background: var(--paper-3); }
.nav a.active { color: var(--ink); background: var(--paper-3); }
.nav-meta {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-left: 16px;
  padding-left: 16px;
  border-left: 0.5px solid var(--rule);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-3);
}
.nav-meta .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--verify);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--verify) 20%, transparent);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* ============ TOP STRIP / GOV BAR ============ */
.gov-strip {
  background: #ecdfc8;
  border-bottom: 0.5px solid var(--rule);
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.gov-strip-inner {
  max-width: 1360px;
  margin: 0 auto;
  padding: 6px 40px;
  display: flex;
  gap: 24px;
  align-items: center;
}
.gov-strip .sep { color: var(--ink-4); }
.gov-strip .shield {
  width: 10px; height: 12px;
  display: inline-block;
  vertical-align: -2px;
  margin-right: 6px;
}

/* ============ LAYOUT ============ */
.wrap {
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 40px;
}
.wrap-narrow {
  max-width: 980px;
  margin: 0 auto;
  padding: 0 40px;
}

/* ============ TYPE ============ */
.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-3);
  font-weight: 500;
}
.display {
  font-family: var(--sans);
  font-weight: 600;
  letter-spacing: -0.025em;
  line-height: 1.05;
  color: var(--ink);
}
.lede {
  font-family: var(--sans);
  font-size: 17px;
  line-height: 1.55;
  letter-spacing: -0.005em;
  color: var(--ink-2);
  font-weight: 400;
}

/* ============ BUTTONS ============ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  font-size: 13.5px;
  font-weight: 500;
  border-radius: 999px;
  border: 0.5px solid transparent;
  transition: all 0.15s;
  background: transparent;
  color: var(--ink);
  letter-spacing: 0.005em;
}
.btn-primary {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.btn-primary:hover { background: var(--ink-2); }
.btn-ghost {
  border-color: var(--rule);
  background: var(--paper-2);
}
.btn-ghost:hover { border-color: var(--ink-3); background: var(--paper); }
.btn-accent {
  background: var(--accent);
  color: var(--paper);
  border-color: var(--accent);
}
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ============ BADGES ============ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
  border: 0.5px solid var(--rule);
  background: var(--paper-2);
  color: var(--ink-2);
}
.badge-verify { background: var(--verify-soft); color: var(--verify); border-color: color-mix(in oklab, var(--verify) 30%, transparent); }
.badge-accent { background: var(--accent-soft); color: var(--accent); border-color: color-mix(in oklab, var(--accent) 30%, transparent); }
.badge-warn { background: #f6ead5; color: var(--warn); border-color: color-mix(in oklab, var(--warn) 30%, transparent); }
.badge-dot::before {
  content: '';
  width: 5px; height: 5px; border-radius: 50%;
  background: currentColor;
}

/* ============ CARDS ============ */
.card {
  background: var(--paper-2);
  border: 0.5px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 28px;
}
.card-flat {
  background: transparent;
  border-top: 0.5px solid var(--rule);
  padding: 28px 0;
}

/* ============ HAIRLINE RULES ============ */
.hr {
  height: 0.5px;
  background: var(--rule);
  border: none;
  margin: 0;
}

/* ============ FOOTER ============ */
.site-footer {
  margin-top: 120px;
  border-top: 0.5px solid var(--rule);
  background: var(--paper-3);
  padding: 64px 0 28px;
}
.footer-grid {
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 40px;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 48px;
}
.footer-grid h5 {
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  font-weight: 500;
  margin: 0 0 14px;
}
.footer-grid ul { list-style: none; padding: 0; margin: 0; }
.footer-grid li { margin-bottom: 8px; font-size: 13px; color: var(--ink-2); }
.footer-grid li a:hover { color: var(--accent); }
.footer-bottom {
  max-width: 1360px;
  margin: 48px auto 0;
  padding: 20px 40px 0;
  border-top: 0.5px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ============ TABLES ============ */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
}
.tbl th {
  text-align: left;
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-3);
  font-weight: 500;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--rule);
}
.tbl td {
  padding: 16px;
  border-bottom: 0.5px solid var(--rule-2);
  vertical-align: middle;
}
.tbl tr:hover td { background: var(--paper-2); }
.tbl .mono { font-family: var(--mono); font-size: 12.5px; }
.tbl a.id { color: var(--accent); font-family: var(--mono); font-size: 12.5px; }

/* ============ MONO SEQUENCE BLOCK ============ */
.seq-block {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
  background: var(--paper-2);
  border: 0.5px solid var(--rule);
  border-radius: var(--radius);
  padding: 18px 22px;
  color: var(--ink-2);
  overflow-x: auto;
  letter-spacing: 0.02em;
}
.seq-block .idx { color: var(--ink-4); user-select: none; margin-right: 18px; }
.seq-block .wm { background: color-mix(in oklab, var(--verify) 22%, transparent); border-radius: 2px; padding: 0 1px; }

/* ============ TWEAKS PANEL ============ */
.tweaks {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 100;
  background: var(--paper-2);
  border: 0.5px solid var(--rule);
  border-radius: 8px;
  padding: 16px 18px;
  width: 260px;
  box-shadow: 0 10px 40px rgba(26,24,21,0.08), 0 2px 6px rgba(26,24,21,0.04);
  font-size: 12.5px;
  display: none;
}
.tweaks.open { display: block; }
.tweaks h6 {
  font-family: var(--mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-3);
  margin: 0 0 12px;
  font-weight: 500;
  display: flex; justify-content: space-between; align-items: center;
}
.tweak-row { margin-bottom: 14px; }
.tweak-row label { display: block; font-size: 11px; color: var(--ink-3); margin-bottom: 6px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; }
.swatches { display: flex; gap: 6px; }
.sw { width: 22px; height: 22px; border-radius: 50%; border: 0.5px solid var(--rule); cursor: pointer; }
.sw.active { box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--ink); }
.seg { display: flex; border: 0.5px solid var(--rule); border-radius: 4px; overflow: hidden; }
.seg button { flex: 1; padding: 6px 8px; background: transparent; border: none; font-size: 11px; color: var(--ink-3); cursor: pointer; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.05em; }
.seg button.active { background: var(--ink); color: var(--paper); }

/* ============ ROUTE TRANSITIONS ============ */
.route { animation: fadein 0.4s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; }}

/* ============ HERO HELIX ============ */
.helix-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  max-width: 480px;
  margin-left: auto;
}
.helix-wrap svg { width: 100%; height: 100%; }

/* ============ CERT SEAL ============ */
.seal-ring { animation: rot 60s linear infinite; transform-origin: center; }
@keyframes rot { to { transform: rotate(360deg); } }

/* ============ DENSITY MODES ============ */
body[data-density="compact"] .card { padding: 20px; }
body[data-density="compact"] .site-header-inner { padding: 10px 40px; }
body[data-density="roomy"] .card { padding: 36px; }

/* ============ UTIL ============ */
.grid-12 { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
.flex { display: flex; }
.between { justify-content: space-between; }
.center { align-items: center; }
.gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; } .gap-24 { gap: 24px; }
.mt-4 { margin-top: 4px; } .mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; } .mt-40 { margin-top: 40px; } .mt-64 { margin-top: 64px; } .mt-96 { margin-top: 96px; }
.mb-4 { margin-bottom: 4px; } .mb-8 { margin-bottom: 8px; } .mb-16 { margin-bottom: 16px; } .mb-24 { margin-bottom: 24px; } .mb-40 { margin-bottom: 40px; }
.text-ink-3 { color: var(--ink-3); }
.text-ink-2 { color: var(--ink-2); }
.text-accent { color: var(--accent); }
.mono { font-family: var(--mono); }
.serif { font-family: var(--serif); }

</style>
</head>

// Shared components & SVG motifs for ArtGene Archive

// ============ HELIX SVG (subtle, editorial) ============
function Helix({ animated = true }) {
  // Generate two sine-wave strands
  const points = 48;
  const w = 400, h = 400;
  const amp = 80;
  const cx = w/2;
  const strandA = [];
  const strandB = [];
  for (let i = 0; i <= points; i++) {
    const t = i / points;
    const y = t * h;
    const phase = t * Math.PI * 5;
    strandA.push([cx + Math.sin(phase) * amp, y]);
    strandB.push([cx - Math.sin(phase) * amp, y]);
  }
  // Crossbars every 4 points
  const bars = [];
  for (let i = 2; i < points; i += 3) {
    const [x1, y1] = strandA[i];
    const [x2, y2] = strandB[i];
    const back = Math.sin((i/points)*Math.PI*5) > 0;
    bars.push({ x1, y1, x2, y2, back });
  }
  return (
    <svg viewBox={`0 0 ${w} ${h}`}>
      <defs>
        <filter id="ink-blur" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="0.3"/>
        </filter>
      </defs>
      {/* Concentric rings backdrop */}
      {[180,140,100,60].map((r,i)=>(
        <circle key={r} cx={cx} cy={h/2} r={r} fill="none" stroke="var(--rule)" strokeWidth="0.3" opacity={0.6 - i*0.1}/>
      ))}
      {/* Compass ticks */}
      {Array.from({length:60}).map((_,i)=>{
        const a = (i/60)*Math.PI*2;
        const r1 = 190, r2 = i%5===0 ? 200 : 196;
        return <line key={i} x1={cx+Math.cos(a)*r1} y1={h/2+Math.sin(a)*r1} x2={cx+Math.cos(a)*r2} y2={h/2+Math.sin(a)*r2} stroke="var(--ink-4)" strokeWidth="0.4"/>;
      })}
      {/* Strand B (back, lighter) */}
      <polyline points={strandB.map(p=>p.join(',')).join(' ')} fill="none" stroke="var(--ink-3)" strokeWidth="0.8" opacity="0.55"/>
      {/* Bars behind */}
      {bars.filter(b=>b.back).map((b,i)=>(
        <line key={'bb'+i} x1={b.x1} y1={b.y1} x2={b.x2} y2={b.y2} stroke="var(--ink-4)" strokeWidth="0.5" opacity="0.7"/>
      ))}
      {/* Strand A (front) */}
      <polyline points={strandA.map(p=>p.join(',')).join(' ')} fill="none" stroke="var(--ink)" strokeWidth="1.1"/>
      {/* Bars in front */}
      {bars.filter(b=>!b.back).map((b,i)=>(
        <line key={'bf'+i} x1={b.x1} y1={b.y1} x2={b.x2} y2={b.y2} stroke="var(--accent)" strokeWidth="0.7"/>
      ))}

}

// ============ CODON WATERMARK GRID (cryptographic motif) ============
function CodonGrid({ rows = 8, cols = 16, highlights = null }) {
  // Deterministic pattern: bits of an arbitrary signature
  const cells = [];
  const sig = "01101001 10110100 11001010 01110011 10010110 01011100 11100101 00110110".replace(/ /g,'');
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = (r * cols + c) % sig.length;
      const on = sig[idx] === '1';
      cells.push({ r, c, on });
    }
  }
  const cell = 14, gap = 3;
  const w = cols * (cell + gap), h = rows * (cell + gap);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%">
      {cells.map(({r,c,on},i)=>(
        <rect key={i} x={c*(cell+gap)} y={r*(cell+gap)} width={cell} height={cell} rx="1"
          fill={on ? 'var(--accent)' : 'var(--rule)'}
          opacity={on ? 1 : 0.5}/>
      ))}
    </svg>
  );
}

// ============ CERT SEAL ============
function CertSeal({ size = 180 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 200 200">
      <defs>
        <path id="seal-circle" d="M 100 100 m -78 0 a 78 78 0 1 1 156 0 a 78 78 0 1 1 -156 0"/>
      </defs>
      {/* Outer ring with ticks */}
      <g className="seal-ring">
        {Array.from({length:72}).map((_,i)=>{
          const a=(i/72)*Math.PI*2;
          const r1 = 92, r2 = i%6===0?98:95;
          return <line key={i} x1={100+Math.cos(a)*r1} y1={100+Math.sin(a)*r1} x2={100+Math.cos(a)*r2} y2={100+Math.sin(a)*r2} stroke="var(--ink)" strokeWidth="0.5"/>;
        })}
        <text fontSize="8.5" fontFamily="var(--mono)" letterSpacing="0.28em" fill="var(--ink-2)">
          <textPath href="#seal-circle" startOffset="0">
            ARTGENE CONSORTIUM · CERTIFIED PROVENANCE · 2026 · TAMPER EVIDENT ·
          </textPath>
        </text>
      </g>
      {/* Inner */}
      <circle cx="100" cy="100" r="62" fill="none" stroke="var(--ink)" strokeWidth="0.5"/>
      <circle cx="100" cy="100" r="52" fill="var(--accent-soft)" stroke="var(--accent)" strokeWidth="0.5"/>
      {/* Central mark */}
      <g transform="translate(100 100)">
        <path d="M -28 14 Q 0 -20, 28 14 M -28 -14 Q 0 20, 28 -14" stroke="var(--accent)" strokeWidth="1.2" fill="none"/>
        <circle r="3" fill="var(--accent)"/>
      </g>
      <text x="100" y="156" textAnchor="middle" fontSize="8" fontFamily="var(--mono)" letterSpacing="0.2em" fill="var(--ink-2)">AG·2026</text>
    </svg>

}

// ============ ANIMATED COUNTER ============
function Counter({ to, suffix = '', dur = 1200 }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let start; let raf;
    const tick = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setN(Math.round(to * eased));
      if (p < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [to]);
  return <>{n.toLocaleString()}{suffix}</>;
}

// ============ TICKER ============
function Ticker({ items }) {
  return (
    <div style={{
      overflow:'hidden',
      borderTop:'0.5px solid var(--rule)',
      borderBottom:'0.5px solid var(--rule)',
      background:'var(--paper-2)',
      position:'relative',
    }}>
      <div style={{display:'flex',gap:'48px',padding:'10px 0',animation:'slide 60s linear infinite',whiteSpace:'nowrap'}}>
        {[...items, ...items].map((it,i)=>(
          <span key={i} style={{fontFamily:'var(--mono)',fontSize:11.5,color:'var(--ink-2)',letterSpacing:'0.04em'}}>

          </span>
        ))}
      </div>
      <style>{`@keyframes slide { to { transform: translateX(-50%); } }`}</style>
    </div>
  );
}

function GateRow({ gate, running, done }) {
  const [prog, setProg] = React.useState(0);
  const [finished, setFinished] = React.useState(false);
  React.useEffect(()=>{
    if (!running && !done) return;
    let raf;
    const start = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - start) / gate.ms);
      setProg(p);
      if (p < 1) raf = requestAnimationFrame(tick);
      else setFinished(true);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [running, done]);
  return (
    <div style={{padding:'14px 0',borderTop:'0.5px solid var(--rule-2)'}}>
      <div className="flex between center">
        <div className="flex gap-12 center">
          <div style={{width:28,height:28,borderRadius:'50%',border:'0.5px solid var(--ink)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--serif)',fontSize:15,color:'var(--accent)'}}>{gate.letter}</div>
          <div style={{fontSize:13.5}}>{gate.name}</div>
        </div>
        {finished ? <span className="mono" style={{fontSize:11,color:'var(--verify)',letterSpacing:'0.1em',textTransform:'uppercase'}}>✓ PASS</span> : <span className="mono" style={{fontSize:11,color:'var(--ink-3)',letterSpacing:'0.1em',textTransform:'uppercase'}}>{prog>0?`${Math.round(prog*100)}%`:'QUEUED'}</span>}
      </div>
      <div style={{height:2,background:'var(--rule)',borderRadius:1,marginTop:10,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${prog*100}%`,background:finished?'var(--verify)':'var(--accent)',transition:'width 0.1s'}}/>
      </div>
    </div>
  );
}

                <div className="seg">
                  {['home','registry','record','register'].map(r=>(
                    <button key={r} className={route===r?'active':''} onClick={()=>setRoute(r)} style={{fontSize:10}}>{r}</button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
