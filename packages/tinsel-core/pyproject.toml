[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tinsel-core"
version = "1.0.0"
description = "TINSEL Algorithm — Traceable Identity Notation for Sequence Encryption + Ledger"
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.26",
    "pydantic>=2.7",
]

[project.optional-dependencies]
test = [
    "pytest>=8.1",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
]

[tool.hatch.build.targets.wheel]
packages = ["tinsel"]
