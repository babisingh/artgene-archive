[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tinsel-gates"
version = "1.0.0"
description = "Four-gate biosafety consequence pipeline for the ArtGene / TINSEL platform"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "tinsel-core>=1.0.0",
    "pydantic>=2.7",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.1",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["tinsel_gates"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
