[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tinsel-gates"
version = "0.1.0"
description = "Async gate adapters and pipeline orchestrator for Tinsel / ArtGene"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
  "tinsel-core>=0.1.0",
  "pydantic>=2.7",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["sentinel_gates"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
