[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tinsel-api"
version = "1.0.0"
description = "FastAPI + Mangum Lambda handler for the ArtGene / TINSEL platform"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
    "tinsel-core>=1.0.0",
    "tinsel-gates>=1.0.0",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.29",
    "mangum>=0.17",
    "asyncpg>=0.29",
    "sqlalchemy[asyncio]>=2.0",
    "alembic>=1.13",
    "pydantic-settings>=2.2",
    "boto3>=1.34",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.1",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.4",
    "aiosqlite>=0.20",
]

[tool.hatch.build.targets.wheel]
packages = ["tinsel_api", "sentinel_api"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
