[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tinsel-api"
version = "0.1.0"
description = "FastAPI + Mangum Lambda handler for the ArtGene / Tinsel platform"
requires-python = ">=3.12"
license = { text = "MIT" }
dependencies = [
  "tinsel-core>=0.1.0",
  "tinsel-gates>=0.1.0",
  "fastapi>=0.111",
  "mangum>=0.17",
  "uvicorn[standard]>=0.29",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "httpx>=0.27",
  "ruff>=0.4",
]

[tool.hatch.build.targets.wheel]
packages = ["tinsel_api"]
