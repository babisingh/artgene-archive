name: CI

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  lint-python:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/tinsel-core packages/tinsel-gates packages/tinsel-api

  # ────────────────────────────────────────────────────────────────────────────
  test-tinsel-core:
    name: tinsel-core unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tinsel-core + dev deps
        run: |
          pip install "packages/tinsel-core[dev]"
      - name: Run pytest
        run: |
          cd packages/tinsel-core
          python -m pytest tests/unit/ -v --tb=short

  # ────────────────────────────────────────────────────────────────────────────
  test-tinsel-gates:
    name: tinsel-gates unit tests
    runs-on: ubuntu-latest
    needs: test-tinsel-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages
        run: |
          pip install "packages/tinsel-core"
          pip install "packages/tinsel-gates[dev]"
      - name: Run pytest
        run: |
          cd packages/tinsel-gates
          python -m pytest tests/ -v --tb=short
        continue-on-error: true   # gates tests not yet created — remove in Phase 3

  # ────────────────────────────────────────────────────────────────────────────
  test-tinsel-api:
    name: tinsel-api unit tests
    runs-on: ubuntu-latest
    needs: test-tinsel-gates
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install packages
        run: |
          pip install "packages/tinsel-core"
          pip install "packages/tinsel-gates"
          pip install "packages/tinsel-api[dev]"
      - name: Run pytest
        run: |
          cd packages/tinsel-api
          python -m pytest tests/ -v --tb=short
        continue-on-error: true   # api tests not yet created — remove in Phase 3

  # ────────────────────────────────────────────────────────────────────────────
  lint-dashboard:
    name: Dashboard lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/dashboard/package.json
      - name: Install deps
        run: npm install --prefix apps/dashboard
      - name: Type-check
        run: npm run type-check --prefix apps/dashboard
        continue-on-error: true   # tsconfig strict — remove in Phase 4
      - name: Lint
        run: npm run lint --prefix apps/dashboard
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  all-green:
    name: All checks passed
    runs-on: ubuntu-latest
    needs:
      - lint-python
      - test-tinsel-core
      - test-tinsel-gates
      - test-tinsel-api
      - lint-dashboard
    steps:
      - run: echo "All CI jobs completed."
