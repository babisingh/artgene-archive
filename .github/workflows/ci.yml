name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install -e packages/tinsel-core[test] --system
      - name: Lint
        run: ruff check packages/tinsel-core/
      - name: Type check
        run: mypy packages/tinsel-core/tinsel/
      - name: Test
        run: pytest packages/tinsel-core/tests/ -v --cov=tinsel --cov-report=xml
        env:
          SENTINEL_ENV: test
