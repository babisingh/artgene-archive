services:
  api:
    build:
      context: ./packages/tinsel-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - LOG_LEVEL=debug
    env_file:
      - .env
    volumes:
      - ./packages/tinsel-core:/app/packages/tinsel-core
      - ./packages/tinsel-gates:/app/packages/tinsel-gates
    depends_on:
      - redis
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  worker:
    build:
      context: ./packages/tinsel-api
      dockerfile: Dockerfile
    command: ["python", "-m", "tinsel_api.worker"]
    environment:
      - ENV=development
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - worker
