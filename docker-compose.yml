services:
  api:
    build:
      context: .
      dockerfile: packages/tinsel-api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SENTINEL_ENV=development
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:tinsel_local_password@db:5432/artgene}
      - SPREADING_KEY_ID=${SPREADING_KEY_ID:-local-dev-key}
      - SPREADING_KEY=${SPREADING_KEY:-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app/packages/tinsel-api &&
             alembic upgrade head &&
             python /app/packages/tinsel-api/scripts/seed_dev.py &&
             uvicorn sentinel_api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build:
      context: apps/dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

  db:
    image: supabase/postgres:15.1.0.147
    environment:
      POSTGRES_PASSWORD: tinsel_local_password
      POSTGRES_DB: artgene
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artgene"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
