version: "3.9"
services:
  api:
    build:
      context: packages/tinsel-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SENTINEL_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - SPREADING_KEY_ID=${SPREADING_KEY_ID}
      - SPREADING_KEY=${SPREADING_KEY}
    depends_on:
      - db

  db:
    image: supabase/postgres:15.1.0.147
    environment:
      POSTGRES_PASSWORD: tinsel_local_password
      POSTGRES_DB: artgene
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
