[tool.uv.workspace]
members = [
    "packages/tinsel-core",
    "packages/tinsel-gates",
    "packages/tinsel-api",
    "packages/tinsel-demo",
]

[tool.uv.sources]
tinsel-core = { workspace = true }
tinsel-gates = { workspace = true }
tinsel-api = { workspace = true }
tinsel-demo = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

# FastAPI/SQLAlchemy ecosystem: decorators and scalar() calls are untyped
# in a way that triggers strict errors; relax only the noisy checks.
[[tool.mypy.overrides]]
module = ["sentinel_api.*"]
disallow_untyped_decorators = false
warn_return_any = false
disallow_any_generics = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"
testpaths = [
    "packages/tinsel-core/tests",
    "packages/tinsel-gates/tests",
    "packages/tinsel-api/tests",
]

[dependency-groups]
dev = [
    "aiosqlite>=0.22.1",
]
