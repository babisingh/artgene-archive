[tool.uv.workspace]
members = [
    "packages/tinsel-core",
    "packages/tinsel-gates",
    "packages/tinsel-api",
]

[tool.ruff]
line-length = 100
target-version = "py312"
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "packages/tinsel-core/tests",
    "packages/tinsel-gates/tests",
    "packages/tinsel-api/tests",
]
